services:
  mypos-postgres:
    image: postgres:16
    container_name: mypos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mypos
      POSTGRES_PASSWORD: mypos123
      POSTGRES_DB: mypostest
    ports:
      - "5434:5434"
    volumes:
      - mypos_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mypos -d mypostest"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  mypos_pgdata:
