# Despliegue automático al servidor Oracle (o cualquier VPS con SSH).
#
# Secrets en GitHub → Settings → Secrets → Actions:
#   ORACLE_HOST      IP pública del servidor
#   ORACLE_USER      ubuntu (Oracle) u opc
#   ORACLE_SSH_KEY   clave privada SSH (PEM)
#   ORACLE_APP_DIR   opcional, default /opt/yallpos
#
# El servidor debe tener el repo clonado y .env.production configurado
# (ejecutar scripts/setup-oracle-server.sh una vez).

name: Deploy Oracle

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.repository == 'fhavipee/yallpos'
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            APP_DIR="${{ secrets.ORACLE_APP_DIR }}"
            if [ -z "$APP_DIR" ]; then APP_DIR="/opt/yallpos"; fi
            cd "$APP_DIR"
            git config --global --add safe.directory "$APP_DIR"
            git fetch origin main
            git checkout main
            git pull origin main
            chmod +x scripts/*.sh
            ./scripts/update-production.sh
